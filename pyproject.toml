[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-v --tb=short --strict-markers"
markers = [
    "unit: 单元测试",
    "integration: 集成测试",
    "slow: 耗时测试",
]

[tool.coverage.run]
source = ["scripts", "hermass_platform"]
omit = [
    "*/__init__.py",
    "scripts/alpaca_trading/*",
    "scripts/build_us_*.py",
    "scripts/us_*.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
]
precision = 2

[tool.ruff]
line-length = 110
target-version = "py310"
exclude = [
    ".venv",
    "__pycache__",
    "outputs",
    "backtest",
    "*.sh",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
]
ignore = []

[tool.ruff.lint.isort]
known-first-party = ["hermass_platform", "scripts"]
force-sort-within-sections = true
