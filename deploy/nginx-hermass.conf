# Hermass Internal Console — Nginx 反向代理配置
#
# 使用方式:
#   1. 修改下方 server_name 为你的域名
#   2. 生成 Basic Auth 密码文件: sudo htpasswd -c /etc/nginx/.htpasswd_hermass admin
#   3. 软链到 sites-enabled: sudo ln -s /etc/nginx/sites-available/hermass /etc/nginx/sites-enabled/
#   4. 测试并重载: sudo nginx -t && sudo systemctl reload nginx

upstream hermass_console {
    server 127.0.0.1:8020;
    keepalive 32;
}

server {
    listen 80;
    server_name console.hermass.local;

    # 可选: IP 白名单（优先于 Basic Auth，适合内网场景）
    # 若取消注释，只允许指定 IP 访问，其他返回 403
    # allow 192.168.1.0/24;
    # allow 10.0.0.0/8;
    # deny all;

    # 日志
    access_log /var/log/nginx/hermass_access.log;
    error_log  /var/log/nginx/hermass_error.log;

    # 静态文件直接由 Nginx 处理（减轻 FastAPI 负担）
    location /static/ {
        alias /opt/hermass/web/static/;
        expires 1h;
        add_header Cache-Control "public, immutable";
    }

    # 健康检查可跳过鉴权（方便外部监控探针）
    location /health {
        proxy_pass http://hermass_console;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        auth_basic off;
    }

    # AI 对话运行入口需要 Basic Auth
    location = /api/chat/query {
        auth_basic "Hermass Console";
        auth_basic_user_file /etc/nginx/.htpasswd_hermass;
        proxy_pass http://hermass_console/api/chat/query;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
    }

    # 其他所有请求代理到 FastAPI（免登录浏览）
    location / {
        proxy_pass http://hermass_console;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（后续如需实时推送）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

