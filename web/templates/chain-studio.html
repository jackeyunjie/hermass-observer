<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Hermass 产业链工作台</title>
<link rel="stylesheet" href="/static/style.css"/>
<style>
:root {
  --c-leading: #168a4a; --c-improving: #2563eb; --c-weakening: #b7791f; --c-lagging: #c2413b;
  --c-bg: #f4f5f7; --c-card: #fff; --c-border: #dfe3e8; --c-soft: #f7f8fa; --c-muted: #687385; --c-ink: #151a23;
  --c-topic: #7c3aed;
  --radius: 8px; --shadow: 0 1px 2px rgba(16,24,40,.05);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--c-bg); color: var(--c-ink); line-height: 1.45; letter-spacing: 0; }

/* ── Topbar ── */
.topbar { display: flex; justify-content: space-between; align-items: center; gap: 1rem; min-height: 58px; padding: 0.65rem 1.25rem; background: rgba(255,255,255,.96); border-bottom: 1px solid var(--c-border); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(8px); }
.topbar .brand-title { display: flex; align-items: baseline; gap: 0.6rem; margin-bottom: 0.35rem; }
.topbar .brand-title strong { font-size: 0.92rem; letter-spacing: 0; }
.topbar .brand-title span { color: var(--c-muted); font-size: 0.72rem; }
.topbar nav { display: flex; gap: 0.15rem; flex-wrap: wrap; }
.topbar nav a { text-decoration: none; padding: 0.32rem 0.62rem; border-radius: 6px; font-size: 0.78rem; color: var(--c-muted); transition: all .15s; white-space: nowrap; }
.topbar nav a:hover { background: #eef1f5; color: var(--c-ink); }
.topbar nav a.active { background: #151a23; color: #fff; font-weight: 650; }
.topbar .hdr-right { display: flex; align-items: center; gap: 0.75rem; font-size: 0.8rem; color: var(--c-muted); }
.fresh-badge { display: inline-flex; align-items: center; gap: 4px; padding: 0.18rem 0.58rem; border-radius: 999px; font-size: 0.72rem; font-weight: 650; border: 1px solid transparent; }
.fresh-badge.ok { background: #dcfce7; color: #15803d; }
.fresh-badge.stale { background: #fef3c7; color: #a16207; }
.fresh-badge.old { background: #fee2e2; color: #b91c1c; }

/* ── Layout ── */
.app { display: flex; min-height: calc(100vh - 58px); }
.sidebar { width: 294px; flex-shrink: 0; background: #fff; border-right: 1px solid var(--c-border); padding: 0.95rem; overflow-y: auto; }
.sidebar h3 { font-size: 0.72rem; color: var(--c-muted); margin: 0.85rem 0 0.6rem; text-transform: none; letter-spacing: 0; font-weight: 700; }
.sidebar h3.section-label { display: flex; align-items: center; gap: 0.4rem; }
.sidebar h3.section-label .dot { width: 6px; height: 6px; border-radius: 50%; }
.sidebar h3.section-label .dot.live { background: #16a34a; }
.sidebar h3.section-label .dot.plan { background: #f59e0b; }
.sidebar h3.section-label .dot.topic { background: var(--c-topic); }
.chain-item { display: flex; flex-direction: column; padding: 0.7rem 0.72rem; border-radius: var(--radius); cursor: pointer; margin-bottom: 0.38rem; border: 1px solid transparent; transition: background .15s, border-color .15s, box-shadow .15s; }
.chain-item:hover { background: #f7f9fc; border-color: #d8dee8; }
.chain-item.selected { background: #f1f6ff; border-color: #8fb7ff; box-shadow: inset 3px 0 0 #2563eb; }
.chain-item.pending { opacity: 0.65; cursor: pointer; border-style: dashed; }
.chain-item.pending:hover { opacity: 0.9; background: #fffbeb; border-color: #fbbf24; }
.chain-item .ci-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.35rem; }
.chain-item .ci-name { font-weight: 700; font-size: 0.88rem; }
.chain-item .ci-name-sm { font-weight: 700; font-size: 0.82rem; display: flex; align-items: center; gap: 0.35rem; }
.chain-item .ci-regime { font-size: 0.68rem; padding: 1px 7px; border-radius: 999px; font-weight: 700; border: 1px solid currentColor; }
.chain-item .ci-details { font-size: 0.72rem; color: var(--c-muted); display: flex; gap: 0.75rem; }
.ci-progress { height: 3px; background: #e5e9f0; border-radius: 2px; margin-top: 0.4rem; overflow: hidden; }
.ci-progress-bar { height: 100%; border-radius: 2px; transition: width .3s; }
/* Topic item */
.topic-item { display: flex; flex-direction: column; padding: 0.65rem 0.72rem; border-radius: var(--radius); cursor: pointer; margin-bottom: 0.38rem; border: 1px solid #ede9fe; background: #faf8ff; transition: all .15s; }
.topic-item:hover { border-color: #c4b5fd; box-shadow: 0 1px 4px rgba(124,58,237,.08); }
.topic-item.selected { background: #f5f3ff; border-color: #8b5cf6; }
.topic-item .ti-header { font-weight: 700; font-size: 0.82rem; color: var(--c-topic); margin-bottom: 0.2rem; }
.topic-item .ti-date { font-size: 0.68rem; color: var(--c-muted); }
.topic-item .ti-summary { font-size: 0.72rem; color: var(--c-muted); margin-top: 0.3rem; line-height: 1.3; }

.main { flex: 1; padding: 1.15rem 1.25rem 2rem; overflow-y: auto; max-width: 1180px; }
.panel { background: var(--c-card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1rem; margin-bottom: 0.95rem; border: 1px solid var(--c-border); }
.panel-hd { display: flex; justify-content: space-between; align-items: center; gap: 1rem; margin-bottom: 0.8rem; padding-bottom: 0.62rem; border-bottom: 1px solid #edf0f4; }
.panel-hd h2 { font-size: 0.95rem; font-weight: 760; }
.panel-hd span { font-size: 0.78rem; color: var(--c-muted); }

/* ── Placeholder ── */
.placeholder-box { text-align: center; padding: 4.5rem 2rem; color: var(--c-muted); border: 1px dashed #cfd6e2; border-radius: var(--radius); background: #fff; }
.placeholder-box svg { width: 56px; height: 56px; opacity: 0.22; margin-bottom: 0.9rem; }
.placeholder-box h2 { font-size: 1rem; margin-bottom: 0.35rem; color: #667085; }

/* ── Score gauge ── */
.summary-strip { display: grid; grid-template-columns: minmax(220px, 1.2fr) repeat(3, minmax(120px, 1fr)); gap: 0; border: 1px solid #edf0f4; border-radius: var(--radius); overflow: hidden; }
.score-gauge { display: flex; align-items: center; gap: 0.85rem; padding: 0.8rem 0.95rem; background: #fbfcfd; }
.score-ring { position: relative; width: 70px; height: 70px; flex-shrink: 0; }
.score-ring svg { transform: rotate(-90deg); }
.score-ring .val { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.26rem; font-weight: 760; }
.score-info { font-size: 0.82rem; }
.score-info .label { color: var(--c-muted); }
.score-info .value { font-weight: 760; margin-top: 0.12rem; }

/* ── Metric pills ── */
.metrics-row { display: flex; gap: 1rem; flex-wrap: wrap; }
.metric-pill { min-width: 0; padding: 0.85rem 0.95rem; border-left: 1px solid #edf0f4; background: #fff; }
.metric-pill .mp-label { font-size: 0.7rem; color: var(--c-muted); margin-bottom: 0.18rem; }
.metric-pill .mp-value { font-size: 1rem; font-weight: 760; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.metric-pill .mp-sub { font-size: 0.7rem; color: var(--c-muted); margin-top: 0.1rem; }

/* ── Chain structure diagram ── */
.chain-struct { display: flex; gap: 0; align-items: stretch; justify-content: center; border: 1px solid #edf0f4; border-radius: var(--radius); overflow: hidden; margin-bottom: 1rem; }
.chain-struct .cs-tier { flex: 1; padding: 0.8rem 0.6rem; text-align: center; border-right: 1px solid #edf0f4; background: #fbfcfd; }
.chain-struct .cs-tier:last-child { border-right: 0; }
.chain-struct .cs-tier .cs-label { font-size: 0.68rem; color: var(--c-muted); margin-bottom: 0.3rem; }
.chain-struct .cs-tier .cs-nodes { font-size: 0.78rem; font-weight: 650; color: var(--c-ink); }

/* ── Flow graph ── */
.flow-graph { position: relative; padding: 0.35rem 0 0.55rem; overflow-x: auto; }
.flow-row { display: flex; align-items: stretch; justify-content: flex-start; gap: 0; margin-bottom: 0.5rem; min-width: max-content; }
.flow-node { position: relative; width: 150px; min-height: 76px; padding: 0.65rem 0.58rem; text-align: left; border-radius: var(--radius); border: 1px solid transparent; border-left-width: 3px; cursor: pointer; transition: border-color .2s, box-shadow .2s, transform .2s; flex-shrink: 0; background: #fff; }
.flow-node:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(16,24,40,.08); }
.flow-node.selected { box-shadow: 0 0 0 3px rgba(37,99,235,.16); }
.flow-arrow { width: 58px; text-align: center; font-size: 1rem; color: #9ca3af; flex-shrink: 0; position: relative; display: flex; align-items: center; justify-content: center; }
.flow-arrow.active { color: var(--c-improving); }
.flow-arrow .flow-label { position: absolute; top: 0.3rem; left: 50%; transform: translateX(-50%); font-size: 0.58rem; white-space: nowrap; color: var(--c-muted); }
.flow-arrow .flow-dir { font-size: 0.58rem; white-space: nowrap; position: absolute; bottom: 0.25rem; left: 50%; transform: translateX(-50%); color: var(--c-muted); }
.node-badge { display: inline-block; font-size: 0.62rem; padding: 1px 6px; border-radius: 999px; margin-top: 0.35rem; font-weight: 700; }

/* ── Tables ── */
.data-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; table-layout: auto; }
.data-table th { text-align: left; padding: 0.48rem 0.6rem; font-size: 0.7rem; color: var(--c-muted); font-weight: 740; border-bottom: 1px solid #dfe3e8; cursor: pointer; user-select: none; white-space: nowrap; background: #fafbfc; }
.data-table th:hover { color: var(--c-ink); }
.data-table th.sorted { color: var(--c-ink); }
.data-table td { padding: 0.48rem 0.6rem; border-bottom: 1px solid #edf0f4; vertical-align: middle; }
.data-table tbody tr { cursor: pointer; transition: background .1s; }
.data-table tbody tr:hover { background: #f7f9fc; }
.data-table tbody tr.expanded { background: #eff6ff; }

.score-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

/* ── Detail expand ── */
.detail-row { display: none; }
.detail-row.open { display: table-row; }
.detail-row td { padding: 0.75rem 1rem; background: #f7f9fc; border-bottom: 1px solid #e5e7eb; font-size: 0.8rem; }

/* ── Search ── */
.search-input { width: 100%; padding: 0.52rem 0.68rem; border: 1px solid var(--c-border); border-radius: var(--radius); font-size: 0.82rem; outline: none; transition: border-color .15s, box-shadow .15s; margin-bottom: 0.75rem; background: #fbfcfd; }
.search-input:focus { border-color: var(--c-improving); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }

/* ── Topic content ── */
.topic-hero { background: linear-gradient(135deg, #f5f3ff 0%, #ede9fe 100%); border: 1px solid #c4b5fd; border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; }
.topic-hero .th-tag { display: inline-block; background: var(--c-topic); color: #fff; padding: 0.15rem 0.6rem; border-radius: 999px; font-size: 0.68rem; font-weight: 700; margin-bottom: 0.5rem; }
.topic-hero h2 { font-size: 1.1rem; margin-bottom: 0.3rem; }
.topic-hero .th-sub { font-size: 0.78rem; color: var(--c-muted); }
.topic-section { margin-bottom: 1.25rem; }
.topic-section h3 { font-size: 0.9rem; font-weight: 750; margin-bottom: 0.5rem; padding-bottom: 0.35rem; border-bottom: 2px solid #ede9fe; }
.topic-section p, .topic-section li { font-size: 0.83rem; line-height: 1.65; color: #374151; }
.topic-section ul { padding-left: 1.2rem; margin: 0.4rem 0; }
.topic-section li { margin-bottom: 0.25rem; }
.strategy-card { border: 1px solid #e5e7eb; border-radius: var(--radius); padding: 0.75rem 0.85rem; margin-bottom: 0.5rem; background: #fff; }
.strategy-card .sc-title { font-weight: 700; font-size: 0.83rem; margin-bottom: 0.3rem; }
.strategy-card .sc-desc { font-size: 0.78rem; color: var(--c-muted); line-height: 1.5; }
.signal-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; margin: 0.5rem 0; }
.signal-table th { text-align: left; padding: 0.4rem 0.55rem; background: #f5f3ff; font-size: 0.72rem; font-weight: 700; color: var(--c-topic); border: 1px solid #ede9fe; }
.signal-table td { padding: 0.4rem 0.55rem; border: 1px solid #ede9fe; font-size: 0.78rem; }

/* ── Risk note ── */
.risk-note { background: #fef2f2; border: 1px solid #fecaca; border-radius: var(--radius); padding: 0.75rem 0.85rem; font-size: 0.8rem; color: #991b1b; margin-top: 0.5rem; }

/* ── Toast ── */
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.6rem 1rem; background: #1f2937; color: #fff; border-radius: 8px; font-size: 0.8rem; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* ── Error ── */
.error-box { padding: 2rem; text-align: center; color: var(--c-muted); }
.error-box code { font-size: 0.8rem; background: #fef2f2; color: #dc2626; padding: 0.25rem 0.5rem; border-radius: 4px; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--c-border); max-height: 260px; }
  .topbar { align-items: flex-start; flex-direction: column; }
  .main { padding: 1rem; }
  .summary-strip { grid-template-columns: 1fr; }
  .metric-pill { border-left: 0; border-top: 1px solid #edf0f4; }
  .flow-node { width: 126px; padding: 0.55rem; font-size: 0.72rem; }
  .flow-arrow { width: 42px; font-size: 0.8rem; }
}
</style>
</head>
<body>

<!-- Topbar -->
<header class="topbar">
  <div>
    <div class="brand-title">
      <strong>Hermass 产业链工作台</strong>
      <span>传导 / 环节 / 候选池</span>
    </div>
    <nav>
      <a href="/?mode=direction">首页</a>
      <a href="/market">市场</a>
      <a href="/industry">行业</a>
      <a href="/chain-studio" class="active">产业链工作台</a>
      <a href="/research">研究</a>
      <a href="/watchlist">执行</a>
      <a href="/backtest">回测</a>
      <a href="/agent-debate">辩论</a>
    </nav>
  </div>
  <div class="hdr-right">
    <span id="fresh-indicator" class="fresh-badge ok">● 数据新鲜</span>
    <span>{{ today }}</span>
  </div>
</header>

<!-- App -->
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <input type="text" class="search-input" placeholder="搜索产业链..." id="chain-search" />

    <!-- 在线产业链 -->
    <h3 class="section-label"><span class="dot live"></span>在线产业链</h3>
    <div id="chain-list"></div>

    <!-- 规划建设 -->
    <h3 class="section-label" style="margin-top:1rem;"><span class="dot plan"></span>规划建设</h3>
    <div id="planned-list"></div>

    <!-- 特别专题 -->
    <h3 class="section-label" style="margin-top:1rem;"><span class="dot topic"></span>特别专题</h3>
    <div id="topic-list"></div>
  </aside>

  <!-- Main -->
  <main class="main" id="main-panel">
    <div class="placeholder-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
      <h2>选择左侧产业链查看详情</h2>
      <p style="font-size:0.85rem;">点击任一产业链，查看全景指标、传导链路与候选标的</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Safe fetch (strip credentials from URL inherited from Basic Auth) ──
const API_BASE = window.location.origin;
function sf(path, opts) { return fetch(new URL(path, API_BASE).toString(), opts); }

// ── State ──
let allChains = []; let allNodes = []; let allEvents = []; let allRRG = []; let allCandidates = [];
let selectedChain = null; let expandedNode = null;

// ── 产业链中文显示名 ──
const CHAIN_NAMES = {
  ai_compute: 'AI算力链', semiconductor: '半导体链', nev: '新能源车链',
  optical_communication: '光通信', memory_chips: '存储芯片', dc_transformer: '直流变压器', power_equipment: '电力设备'
};

// ── 状态 / 象限 中文 ──
const REGIME_COLORS = { expansion: '#16a34a', recovery: '#2563eb', contraction: '#ca8a04', depression: '#dc2626' };
const REGIME_LABELS = { expansion: '扩张', recovery: '复苏', contraction: '收缩', depression: '低迷' };
const QUADRANT_LABELS = { leading: '领先区', improving: '改善区', lagging: '滞后区', weakening: '衰退区' };

// ── 规划建设中的产业链（静态定义，待数据入库）──
const PLANNED_CHAINS = [
  { chain_id: 'optical_communication',  name: '光通信',   desc: '光模块/CPO/光纤链路',       tiers: {上游: '光芯片/电芯片', 中游: '光模块/CPO',     下游: '数据中心/设备商'} },
  { chain_id: 'memory_chips',           name: '存储芯片', desc: 'HBM/DRAM/NAND 产业链',       tiers: {上游: '硅片/光刻胶',   中游: '晶圆制造/封测',  下游: '模组/服务器'} },
  { chain_id: 'dc_transformer',         name: '直流变压器', desc: '数据中心电力配送核心环节', tiers: {上游: '铁芯/绕组材料', 中游: '变压器/配电柜',  下游: '数据中心/新能源'} },
  { chain_id: 'power_equipment',        name: '电力设备', desc: '特高压/配电网/智能电网',     tiers: {上游: '铜/铝/绝缘材料',中游: '开关柜/电缆/ GIS', 下游: '电网公司/新能源电站'} },
];

// ── 特别专题 ──
const TOPICS = [
  { id: 'proshares-etf-2026', date: '2026-06-18', title: 'ProShares 中国AI杠杆ETF 策略分析', summary: '9只两倍杠杆ETF即将上市，量化套利机制解析与A股防守策略' },
];

// ── 当前查看模式 ──
let viewMode = null; // 'chain' | 'planned' | 'topic'

// ── Toast ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Freshness ──
function updateFreshness(stateDate) {
  const badge = document.getElementById('fresh-indicator');
  if (!stateDate) { badge.className = 'fresh-badge old'; badge.textContent = '● 无数据'; return; }
  const d = new Date(stateDate + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.floor((today - d) / 86400000);
  if (diff <= 1) { badge.className = 'fresh-badge ok'; badge.textContent = '● 数据新鲜'; }
  else if (diff <= 3) { badge.className = 'fresh-badge stale'; badge.textContent = '● ' + diff + ' 天前'; }
  else { badge.className = 'fresh-badge old'; badge.textContent = '● ' + diff + ' 天前'; }
}

// ── Fetch all ──
async function loadAll() {
  try {
    const [listRes, nodesRes, eventsRes, rrgRes, candRes] = await Promise.all([
      sf('/api/chain/list'), sf('/api/chain/nodes'),
      sf('/api/chain/events'), sf('/api/chain/rrg'),
      sf('/api/chain/candidates')
    ]);
    const list = await listRes.json();
    const nodes = await nodesRes.json();
    const events = await eventsRes.json();
    const rrg = await rrgRes.json();
    const cand = await candRes.json();

    if (list.ok) allChains = list.chains || [];
    if (nodes.ok) allNodes = nodes.nodes || [];
    if (events.ok) allEvents = events.events || [];
    if (rrg.ok) allRRG = rrg.rrg || [];
    if (cand.ok) allCandidates = cand.candidates || [];

    if (allChains.length > 0) updateFreshness(allChains[0].state_date);
  } catch (e) {
    document.getElementById('main-panel').innerHTML = '<div class="error-box"><h2>数据加载失败</h2><code>' + e.message + '</code></div>';
  }
  renderSidebar();
}

// ── Sidebar render (live + planned + topic) ──
function renderSidebar() {
  // 在线产业链
  const liveEl = document.getElementById('chain-list');
  const q = (document.getElementById('chain-search')?.value || '').toLowerCase();
  const filtered = allChains.filter(c => {
    const cn = CHAIN_NAMES[c.chain_id] || c.chain_id;
    return cn.toLowerCase().includes(q) || c.chain_id.toLowerCase().includes(q);
  });
  if (!filtered.length) {
    liveEl.innerHTML = '<p style="color:var(--c-muted);font-size:0.78rem;">暂无匹配产业链</p>';
  } else {
    liveEl.innerHTML = filtered.map(c => {
      const cn = CHAIN_NAMES[c.chain_id] || c.chain_id;
      const regimeClass = c.regime || 'contraction';
      const color = REGIME_COLORS[regimeClass] || '#6b7280';
      const sel = (viewMode === 'chain' && selectedChain === c.chain_id) ? ' selected' : '';
      return '<div class="chain-item' + sel + '" onclick="selectChain(\'' + c.chain_id + '\')">'
        + '<div class="ci-top">'
        + '<span class="ci-name">' + cn + '</span>'
        + '<span class="ci-regime" style="background:' + color + '20;color:' + color + '">' + (REGIME_LABELS[regimeClass]||c.regime) + '</span>'
        + '</div>'
        + '<div class="ci-progress"><div class="ci-progress-bar" style="width:' + c.prosperity_score + '%;background:' + color + '"></div></div>'
        + '<div class="ci-details"><span>景气 ' + c.prosperity_score + '</span><span>事件 ' + c.event_count + '</span></div>'
        + '</div>';
    }).join('');
  }

  // 规划建设
  const planEl = document.getElementById('planned-list');
  planEl.innerHTML = PLANNED_CHAINS.map(p => {
    const sel = (viewMode === 'planned' && selectedChain === p.chain_id) ? ' selected' : '';
    return '<div class="chain-item pending' + sel + '" onclick="selectPlanned(\'' + p.chain_id + '\')">'
      + '<div class="ci-top">'
      + '<span class="ci-name-sm">' + p.name + ' <span style="font-size:0.62rem;background:#fef3c7;color:#92400e;padding:0 4px;border-radius:3px;">规划中</span></span>'
      + '</div>'
      + '<div class="ci-details" style="font-size:0.68rem;">' + p.desc + '</div>'
      + '</div>';
  }).join('');

  // 特别专题
  const topicEl = document.getElementById('topic-list');
  topicEl.innerHTML = TOPICS.map(t => {
    const sel = (viewMode === 'topic' && selectedChain === t.id) ? ' selected' : '';
    return '<div class="topic-item' + sel + '" onclick="selectTopic(\'' + t.id + '\')">'
      + '<div class="ti-header">' + t.title + '</div>'
      + '<div class="ti-date">' + t.date + '</div>'
      + '<div class="ti-summary">' + t.summary + '</div>'
      + '</div>';
  }).join('');
}

// ── Select chain ──
async function selectChain(chainId) {
  selectedChain = chainId; viewMode = 'chain'; renderSidebar();

  try {
    const [detailRes, propRes] = await Promise.all([
      sf('/api/chain/' + chainId),
      sf('/api/chain/' + chainId + '/propagation')
    ]);
    renderDetail(chainId, await detailRes.json(), await propRes.json());
  } catch(e) {
    document.getElementById('main-panel').innerHTML = '<div class="error-box"><h2>加载失败</h2><code>' + e.message + '</code></div>';
  }
}

// ── Render detail ──
function renderDetail(chainId, detail, prop) {
  if (!detail.ok) {
    document.getElementById('main-panel').innerHTML = '<div class="error-box"><h2>数据不可用</h2><code>' + detail.error + '</code></div>';
    return;
  }

  const ov = detail.overview || {};
  const nodes = detail.nodes || [];
  const events = detail.events || [];
  const paths = prop.ok ? (prop.paths || []) : [];
  const regime = ov.regime || 'contraction';
  const regColor = REGIME_COLORS[regime] || '#6b7280';
  const score = ov.prosperity_score || 0;
  const circumference = 2 * Math.PI * 35;
  const dash = (score / 100) * circumference;

  const chainCands = allCandidates.filter(c => c.chain_id === chainId);
  const chainRrg = allRRG.filter(r => r.chain_id === chainId);
  const cn = CHAIN_NAMES[chainId] || chainId;

  let html = '';

  // ── Overview card ──
  html += '<div class="panel">'
    + '<div class="panel-hd"><h2>' + cn + ' · 全景指标</h2><span>' + (ov.state_date || '-') + '</span></div>'
    + '<div class="summary-strip">'
    + '<div class="score-gauge">'
    + '<div class="score-ring">'
    + '<svg width="70" height="70" viewBox="0 0 80 80">'
    + '<circle cx="40" cy="40" r="35" fill="none" stroke="#e5e9f0" stroke-width="6"/>'
    + '<circle cx="40" cy="40" r="35" fill="none" stroke="' + regColor + '" stroke-width="6" stroke-dasharray="' + dash + ' ' + circumference + '" stroke-linecap="round"/>'
    + '</svg>'
    + '<div class="val" style="color:' + regColor + '">' + score + '</div>'
    + '</div>'
    + '<div class="score-info">'
    + '<div class="label">景气度评分</div>'
    + '<div class="value" style="color:' + regColor + '">' + (REGIME_LABELS[regime]||regime) + '周期</div>'
    + '</div>'
    + '</div>'
    + '<div class="metric-pill"><div class="mp-label">事件数</div><div class="mp-value">' + (ov.event_count||0) + '</div><div class="mp-sub">近端冲击</div></div>'
    + '<div class="metric-pill"><div class="mp-label">领涨环节</div><div class="mp-value" style="color:var(--c-leading)">' + (ov.lead_node||'未确定') + '</div><div class="mp-sub">相对强势</div></div>'
    + '<div class="metric-pill"><div class="mp-label">滞涨环节</div><div class="mp-value" style="color:var(--c-lagging)">' + (ov.lag_node||'未确定') + '</div><div class="mp-sub">风险观察</div></div>'
    + '</div>'
    + '</div>';

  // ── RRG ──
  if (chainRrg.length > 0) {
    html += '<div class="panel">'
      + '<div class="panel-hd"><h2>RRG 相对轮动</h2><span>RS-Ratio / RS-Momentum 四象限</span></div>'
      + '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.55rem;">';
    chainRrg.forEach(r => {
      const qcn = r.quadrant || 'improving';
      const qColor = REGIME_COLORS[qcn] || (qcn === 'lagging' ? 'var(--c-lagging)' : 'var(--c-weakening)');
      html += '<div style="border:1px solid #edf0f4;border-left:3px solid ' + qColor + ';border-radius:8px;padding:.58rem .65rem;background:#fbfcfd;">'
        + '<div style="display:flex;justify-content:space-between;gap:.6rem;align-items:center;">'
        + '<strong style="font-size:.8rem;">' + (r.node_id) + '</strong>'
        + '<span style="font-size:.66rem;color:' + qColor + ';font-weight:760;">' + (QUADRANT_LABELS[qcn]||qcn) + '</span>'
        + '</div>'
        + '<div style="display:flex;gap:.8rem;margin-top:.35rem;color:var(--c-muted);font-size:.7rem;">'
        + '<span>比值 ' + Number(r.rs_ratio || 0).toFixed(1) + '</span>'
        + '<span>动量 ' + Number(r.rs_momentum || 0).toFixed(1) + '</span>'
        + '</div>'
        + '</div>';
    });
    html += '</div></div>';
  }

  // ── Propagation flow ──
  if (paths.length > 0) {
    html += '<div class="panel">'
      + '<div class="panel-hd"><h2>传导链路</h2><span>上下游资金与动量传导</span></div>'
      + '<div class="flow-graph">';
    const nodeSet = new Set();
    paths.forEach(p => { nodeSet.add(p.source_node); nodeSet.add(p.target_node); });
    const flowNodes = Array.from(nodeSet);
    const total = flowNodes.length;

    html += '<div class="flow-row">';
    flowNodes.forEach((n, i) => {
      const nodeData = nodes.find(nd => nd.node_id === n) || {};
      const mom = nodeData.momentum_score || 0;
      const nodeColor = mom > 60 ? 'var(--c-leading)' : mom > 45 ? 'var(--c-improving)' : mom < 35 ? 'var(--c-lagging)' : 'var(--c-weakening)';
      const isLead = ov.lead_node === n;
      const isLag = ov.lag_node === n;
      html += '<div class="flow-node" style="border-color:' + nodeColor + ';" onclick="showNodeDetail(\'' + chainId + '\',\'' + n + '\')" title="点击查看详情">'
        + '<div style="display:flex;justify-content:space-between;gap:.45rem;align-items:flex-start;">'
        + '<div style="font-weight:760;font-size:0.82rem;">' + (nodeData.node_name || n) + '</div>'
        + '<code style="font-size:.64rem;color:var(--c-muted);">' + (nodeData.state_hex || '--') + '</code>'
        + '</div>'
        + '<div style="font-size:0.68rem;color:var(--c-muted);margin-top:.35rem;">' + n + ' · 动量 ' + Number(mom || 0).toFixed(1) + '</div>'
        + (isLead ? '<span class="node-badge" style="background:#dcfce7;color:#15803d;">领涨</span>' : '')
        + (isLag ? '<span class="node-badge" style="background:#fee2e2;color:#b91c1c;">滞涨</span>' : '')
        + '</div>';
      if (i < total - 1) {
        const path = paths.find(p => p.source_node === flowNodes[i] && p.target_node === flowNodes[i+1]);
        const active = path && Math.abs(path.correlation || 0) > 0.3;
        html += '<div class="flow-arrow' + (active ? ' active' : '') + '">'
          + '<span class="flow-label">' + (path ? 'r=' + (path.correlation||0).toFixed(2) : '') + '</span>'
          + '<span class="flow-dir">' + (path ? (path.direction||'→') : '→') + '</span>'
          + '→</div>';
      }
    });
    html += '</div></div></div>';
  }

  // ── Node detail table ──
  if (nodes.length > 0) {
    html += '<div class="panel">'
      + '<div class="panel-hd"><h2>环节详情</h2><span>点击环节查看关联标的</span></div>'
      + '<table class="data-table"><thead><tr><th>环节</th><th>资金流</th><th>仓位</th><th>动量</th><th>State</th><th>操作</th></tr></thead><tbody>';
    nodes.forEach(n => {
      const mom = n.momentum_score || 0;
      const dotColor = mom > 60 ? 'var(--c-leading)' : mom > 45 ? 'var(--c-improving)' : mom < 35 ? 'var(--c-lagging)' : 'var(--c-weakening)';
      html += '<tr onclick="showNodeDetail(\'' + chainId + '\',\'' + n.node_id + '\')" title="点击查看关联标的">'
        + '<td><strong>' + (n.node_name || n.node_id) + '</strong></td>'
        + '<td><span class="score-dot" style="background:' + ((n.fund_flow_score||0) > 50 ? 'var(--c-leading)' : 'var(--c-weakening)') + '"></span>' + (n.fund_flow_score||0).toFixed(1) + '</td>'
        + '<td>' + (n.position_score||0).toFixed(1) + '</td>'
        + '<td style="color:' + dotColor + ';font-weight:600;">' + (n.momentum_score||0).toFixed(1) + '</td>'
        + '<td><code style="font-size:0.75rem;">' + (n.state_hex||'--') + '</code></td>'
        + '<td><span style="font-size:0.75rem;color:var(--c-improving);cursor:pointer;">查看标的 →</span></td>'
        + '</tr>';
      if (expandedNode && expandedNode.chain === chainId && expandedNode.node === n.node_id) {
        html += '<tr class="detail-row open"><td colspan="6"><div id="node-detail-' + n.node_id + '" style="padding:0.5rem 0;">加载中...</div></td></tr>';
      }
    });
    html += '</tbody></table></div>';
  }

  // ── Events ──
  if (events.length > 0) {
    html += '<div class="panel">'
      + '<div class="panel-hd"><h2>近期事件</h2><span>按影响强度排序</span></div>'
      + '<table class="data-table" id="events-table"><thead><tr><th data-sort="event_type">类型</th><th data-sort="event_source">来源</th><th data-sort="impact_score" class="sorted">影响强度 ▾</th><th>描述</th></tr></thead><tbody>';
    events.forEach(e => {
      const impColor = (e.impact_score||0) >= 60 ? 'var(--c-lagging)' : 'var(--c-weakening)';
      html += '<tr>'
        + '<td data-sort-value="' + (e.event_type || '') + '"><span style="font-weight:600;">' + e.event_type + '</span></td>'
        + '<td>' + e.event_source + '</td>'
        + '<td data-sort-value="' + (e.impact_score || 0) + '"><span style="color:' + impColor + ';font-weight:600;">' + e.impact_score + '</span></td>'
        + '<td style="max-width:300px;">' + e.description + '</td>'
        + '</tr>';
    });
    html += '</tbody></table></div>';
  }

  // ── Candidates ──
  if (chainCands.length > 0) {
    html += '<div class="panel">'
      + '<div class="panel-hd"><h2>候选标的</h2><span>前 ' + chainCands.length + ' 只</span></div>'
      + '<table class="data-table" id="cand-table"><thead><tr><th data-sort="stock_code">代码</th><th>名称</th><th data-sort="node_name">环节</th><th data-sort="assistant_score" class="sorted">评分 ▾</th><th>State</th><th>EF</th><th>闸门</th></tr></thead><tbody>';
    chainCands.forEach(c => {
      html += '<tr>'
        + '<td data-sort-value="' + (c.stock_code || '') + '"><code style="font-size:0.8rem;">' + c.stock_code + '</code></td>'
        + '<td><strong>' + c.stock_name + '</strong></td>'
        + '<td data-sort-value="' + (c.node_name || '') + '">' + (c.node_name||'-') + '</td>'
        + '<td data-sort-value="' + (c.assistant_score || 0) + '" style="font-weight:700;">' + (c.assistant_score||0) + '</td>'
        + '<td><code style="font-size:0.7rem;">' + (c.state_hex||'--') + '</code></td>'
        + '<td>' + (c.ef_count||0) + '</td>'
        + '<td>' + (c.review_gate||'-') + '</td>'
        + '</tr>';
    });
    html += '</tbody></table></div>';
  }

  document.getElementById('main-panel').innerHTML = html;
  bindTableSort('events-table');
  bindTableSort('cand-table');
}

async function showNodeDetail(chainId, nodeId) {
  expandedNode = { chain: chainId, node: nodeId };
  const detailEl = document.getElementById('node-detail-' + nodeId);
  if (detailEl) {
    detailEl.innerHTML = '<span style="color:var(--c-muted);">加载中...</span>';
    try {
      const res = await sf('/api/chain/' + chainId + '/node/' + nodeId);
      const data = await res.json();
      if (data.ok && data.stocks && data.stocks.length > 0) {
        const stocksHtml = data.stocks.map(s =>
          '<span style="display:inline-block;margin:2px 4px;padding:2px 8px;background:#fff;border:1px solid #e5e7eb;border-radius:6px;font-size:0.78rem;"><code>' + s.stock_code + '</code> ' + s.stock_name + '</span>'
        ).join('');
        detailEl.innerHTML = '<div style="font-size:0.78rem;color:var(--c-muted);margin-bottom:4px;">关联标的 (' + data.stocks.length + ')：</div>' + stocksHtml;
      } else {
        detailEl.innerHTML = '<span style="color:var(--c-muted);font-size:0.8rem;">暂无关联标的</span>';
      }
    } catch(e) {
      detailEl.innerHTML = '<span style="color:var(--c-lagging);">加载失败: ' + e.message + '</span>';
    }
  } else {
    try {
      const [detailRes, propRes] = await Promise.all([
        sf('/api/chain/' + chainId), sf('/api/chain/' + chainId + '/propagation')
      ]);
      renderDetail(chainId, await detailRes.json(), await propRes.json());
      setTimeout(async () => {
        const el = document.getElementById('node-detail-' + nodeId);
        if (!el) return;
        try {
          const res = await sf('/api/chain/' + chainId + '/node/' + nodeId);
          const data = await res.json();
          if (data.ok && data.stocks && data.stocks.length > 0) {
            const stocksHtml = data.stocks.map(s =>
              '<span style="display:inline-block;margin:2px 4px;padding:2px 8px;background:#fff;border:1px solid #e5e7eb;border-radius:6px;font-size:0.78rem;"><code>' + s.stock_code + '</code> ' + s.stock_name + '</span>'
            ).join('');
            el.innerHTML = '<div style="font-size:0.78rem;color:var(--c-muted);margin-bottom:4px;">关联标的 (' + data.stocks.length + ')：</div>' + stocksHtml;
          } else {
            el.innerHTML = '<span style="color:var(--c-muted);font-size:0.8rem;">暂无关联标的</span>';
          }
        } catch(e) {}
      }, 100);
    } catch(e) {}
  }
}

// ── Table sort ──
function bindTableSort(tableId) {
  const table = document.getElementById(tableId);
  if (!table) return;
  const headers = table.querySelectorAll('th[data-sort]');
  headers.forEach(th => {
    th.addEventListener('click', () => {
      const field = th.dataset.sort;
      const tbody = table.querySelector('tbody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      const isAsc = th.classList.contains('sorted') && th.textContent.includes('▴');
      headers.forEach(h => h.classList.remove('sorted'));
      th.classList.add('sorted');
      rows.sort((a, b) => {
        const aVal = getCellValue(a, field);
        const bVal = getCellValue(b, field);
        const aNum = parseFloat(aVal), bNum = parseFloat(bVal);
        if (!isNaN(aNum) && !isNaN(bNum)) return isAsc ? aNum - bNum : bNum - aNum;
        return isAsc ? String(aVal).localeCompare(String(bVal)) : String(bVal).localeCompare(String(aVal));
      });
      var sortMap = { stock_code: '代码', assistant_score: '评分', impact_score: '影响强度', event_type: '类型', event_source: '来源', node_name: '环节' };
      th.innerHTML = (sortMap[field] || '') + ' ' + (isAsc ? '▴' : '▾');
      rows.forEach(r => tbody.appendChild(r));
    });
  });
}

function getCellValue(row, field) {
  const table = row.closest('table');
  const headers = Array.from(table.querySelectorAll('thead th'));
  let idx = -1;
  headers.forEach((h, i) => { if (h.dataset.sort === field) idx = i; });
  if (idx < 0) return '';
  const cells = row.querySelectorAll('td');
  const cell = cells[idx];
  return cell ? (cell.dataset.sortValue || cell.textContent.trim()) : '';
}
