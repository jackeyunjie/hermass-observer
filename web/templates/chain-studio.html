<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Hermass 产业链工作台</title>
<link rel="stylesheet" href="/static/style.css"/>
<style>
:root {
  --c-leading: #16a34a; --c-improving: #2563eb; --c-weakening: #ca8a04; --c-lagging: #dc2626;
  --c-bg: #f8f9fb; --c-card: #fff; --c-border: #e5e7eb; --c-muted: #6b7280; --c-ink: #111827;
  --radius: 12px; --shadow: 0 1px 3px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--c-bg); color: var(--c-ink); line-height: 1.5; }

/* ── Topbar ── */
.topbar { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 1.5rem; background: #fff; border-bottom: 1px solid var(--c-border); position: sticky; top: 0; z-index: 100; }
.topbar nav { display: flex; gap: 0.25rem; flex-wrap: wrap; }
.topbar nav a { text-decoration: none; padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.82rem; color: var(--c-muted); transition: all .15s; white-space: nowrap; }
.topbar nav a:hover { background: #f3f4f6; color: var(--c-ink); }
.topbar nav a.active { background: var(--c-ink); color: #fff; font-weight: 600; }
.topbar .hdr-right { display: flex; align-items: center; gap: 0.75rem; font-size: 0.8rem; color: var(--c-muted); }
.fresh-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
.fresh-badge.ok { background: #dcfce7; color: #15803d; }
.fresh-badge.stale { background: #fef3c7; color: #a16207; }
.fresh-badge.old { background: #fee2e2; color: #b91c1c; }

/* ── Layout ── */
.app { display: flex; min-height: calc(100vh - 56px); }
.sidebar { width: 280px; flex-shrink: 0; background: #fff; border-right: 1px solid var(--c-border); padding: 1rem; overflow-y: auto; }
.sidebar h3 { font-size: 0.85rem; color: var(--c-muted); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
.chain-item { display: flex; flex-direction: column; padding: 0.75rem; border-radius: 8px; cursor: pointer; margin-bottom: 0.4rem; border: 1px solid transparent; transition: all .15s; }
.chain-item:hover { background: #f8fafc; border-color: #e2e8f0; }
.chain-item.selected { background: #eff6ff; border-color: #93c5fd; }
.chain-item .ci-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.35rem; }
.chain-item .ci-name { font-weight: 600; font-size: 0.88rem; }
.chain-item .ci-regime { font-size: 0.7rem; padding: 1px 8px; border-radius: 10px; font-weight: 600; }
.chain-item .ci-details { font-size: 0.72rem; color: var(--c-muted); display: flex; gap: 0.75rem; }
.ci-progress { height: 4px; background: #e5e7eb; border-radius: 2px; margin-top: 0.35rem; overflow: hidden; }
.ci-progress-bar { height: 100%; border-radius: 2px; transition: width .3s; }

.main { flex: 1; padding: 1.5rem; overflow-y: auto; max-width: 1100px; }
.panel { background: var(--c-card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.25rem; margin-bottom: 1.25rem; border: 1px solid var(--c-border); }
.panel-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
.panel-hd h2 { font-size: 1rem; font-weight: 700; }
.panel-hd span { font-size: 0.78rem; color: var(--c-muted); }

/* ── Placeholder ── */
.placeholder-box { text-align: center; padding: 4rem 2rem; color: var(--c-muted); }
.placeholder-box svg { width: 64px; height: 64px; opacity: 0.25; margin-bottom: 1rem; }
.placeholder-box h2 { font-size: 1.1rem; margin-bottom: 0.5rem; color: #9ca3af; }

/* ── Score gauge ── */
.score-gauge { display: flex; align-items: center; gap: 1rem; }
.score-ring { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
.score-ring svg { transform: rotate(-90deg); }
.score-ring .val { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 700; }
.score-info { font-size: 0.85rem; }
.score-info .label { color: var(--c-muted); }
.score-info .value { font-weight: 600; }

/* ── Metric pills ── */
.metrics-row { display: flex; gap: 1rem; flex-wrap: wrap; }
.metric-pill { flex: 1; min-width: 120px; padding: 0.75rem 1rem; border-radius: 8px; background: #f9fafb; border: 1px solid #f3f4f6; }
.metric-pill .mp-label { font-size: 0.72rem; color: var(--c-muted); margin-bottom: 0.2rem; }
.metric-pill .mp-value { font-size: 1.1rem; font-weight: 700; }
.metric-pill .mp-sub { font-size: 0.7rem; color: var(--c-muted); margin-top: 0.1rem; }

/* ── Flow graph ── */
.flow-graph { position: relative; padding: 1rem 0; overflow-x: auto; }
.flow-row { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 0.5rem; }
.flow-node { position: relative; width: 140px; padding: 0.75rem 0.5rem; text-align: center; border-radius: 8px; border: 2px solid transparent; cursor: pointer; transition: all .2s; flex-shrink: 0; }
.flow-node:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.08); }
.flow-node.selected { box-shadow: 0 0 0 3px rgba(59,130,246,.3); }
.flow-arrow { width: 32px; text-align: center; font-size: 1.1rem; color: #9ca3af; flex-shrink: 0; position: relative; }
.flow-arrow.active { color: var(--c-improving); }
.flow-arrow .flow-label { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); font-size: 0.6rem; white-space: nowrap; color: var(--c-muted); }
.flow-arrow .flow-dir { font-size: 0.6rem; white-space: nowrap; position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%); }
.node-badge { display: inline-block; font-size: 0.65rem; padding: 1px 6px; border-radius: 6px; margin-top: 0.25rem; }

/* ── Tables ── */
.data-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.data-table th { text-align: left; padding: 0.5rem 0.6rem; font-size: 0.72rem; color: var(--c-muted); font-weight: 600; border-bottom: 2px solid #e5e7eb; cursor: pointer; user-select: none; white-space: nowrap; }
.data-table th:hover { color: var(--c-ink); }
.data-table th .sort-icon { margin-left: 2px; opacity: 0.3; }
.data-table th.sorted .sort-icon { opacity: 1; }
.data-table td { padding: 0.5rem 0.6rem; border-bottom: 1px solid #f3f4f6; }
.data-table tbody tr { cursor: pointer; transition: background .1s; }
.data-table tbody tr:hover { background: #f8fafc; }
.data-table tbody tr.expanded { background: #eff6ff; }

.score-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }

/* ── RRG scatter ── */
.rrg-container { position: relative; width: 100%; max-width: 500px; margin: 0 auto; }
.rrg-svg { width: 100%; }
.rrg-dot { cursor: pointer; transition: r .2s; }
.rrg-dot:hover { filter: brightness(0.9); }
.rrg-tooltip { position: absolute; background: #1f2937; color: #fff; padding: 0.35rem 0.6rem; border-radius: 4px; font-size: 0.72rem; pointer-events: none; white-space: nowrap; display: none; z-index: 10; }

/* ── Detail expand ── */
.detail-row { display: none; }
.detail-row.open { display: table-row; }
.detail-row td { padding: 0.75rem 1rem; background: #f8fafc; border-bottom: 1px solid #e5e7eb; font-size: 0.8rem; }
.detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 0.5rem; }
.detail-grid .dg-item { padding: 0.4rem 0.6rem; background: #fff; border-radius: 6px; border: 1px solid #e5e7eb; }
.detail-grid .dg-label { font-size: 0.68rem; color: var(--c-muted); }
.detail-grid .dg-value { font-weight: 600; font-size: 0.85rem; }

/* ── Search ── */
.search-input { width: 100%; padding: 0.5rem 0.75rem; border: 1px solid var(--c-border); border-radius: 8px; font-size: 0.82rem; outline: none; transition: border-color .15s; margin-bottom: 0.75rem; }
.search-input:focus { border-color: var(--c-improving); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }

/* ── Toast ── */
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; padding: 0.6rem 1rem; background: #1f2937; color: #fff; border-radius: 8px; font-size: 0.8rem; z-index: 200; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }

/* ── Error ── */
.error-box { padding: 2rem; text-align: center; color: var(--c-muted); }
.error-box code { font-size: 0.8rem; background: #fef2f2; color: #dc2626; padding: 0.25rem 0.5rem; border-radius: 4px; }

/* ── Responsive ── */
@media (max-width: 768px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--c-border); max-height: 220px; }
  .main { padding: 1rem; }
  .flow-node { width: 100px; padding: 0.5rem; font-size: 0.72rem; }
  .flow-arrow { width: 20px; font-size: 0.8rem; }
  .metrics-row { flex-direction: column; }
}

</style>
</head>
<body>

<!-- Topbar -->
<header class="topbar">
  <div>
    <nav>
      <a href="/?mode=direction">首页</a>
      <a href="/market">市场</a>
      <a href="/industry">行业</a>
      <a href="/chain-studio" class="active">产业链工作台</a>
      <a href="/research">研究</a>
      <a href="/watchlist">执行</a>
      <a href="/backtest">回测</a>
      <a href="/agent-debate">辩论</a>
    </nav>
  </div>
  <div class="hdr-right">
    <span id="fresh-indicator" class="fresh-badge ok">● 数据新鲜</span>
    <span>{{ today }}</span>
  </div>
</header>

<!-- App -->
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <input type="text" class="search-input" placeholder="搜索产业链..." id="chain-search" />
    <h3>产业链列表</h3>
    <div id="chain-list"></div>
  </aside>

  <!-- Main -->
  <main class="main" id="main-panel">
    <div class="placeholder-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
      <h2>选择左侧产业链查看详情</h2>
      <p style="font-size:0.85rem;">点击任一产业链，查看全景指标、传导链路与候选标的</p>
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── State ──
let allChains = []; let allNodes = []; let allEvents = []; let allRRG = []; let allCandidates = [];
let selectedChain = null; let expandedNode = null;

const REGIME_COLORS = {
  expansion: '#16a34a', recovery: '#2563eb', contraction: '#ca8a04', depression: '#dc2626'
};
const REGIME_LABELS = {
  expansion: '扩张', recovery: '复苏', contraction: '收缩', depression: '低迷'
};

// ── Toast ──
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Freshness ──
function updateFreshness(stateDate) {
  const badge = document.getElementById('fresh-indicator');
  if (!stateDate) { badge.className = 'fresh-badge old'; badge.textContent = '● 无数据'; return; }
  const d = new Date(stateDate + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diff = Math.floor((today - d) / 86400000);
  if (diff <= 1) { badge.className = 'fresh-badge ok'; badge.textContent = '● 数据新鲜'; }
  else if (diff <= 3) { badge.className = 'fresh-badge stale'; badge.textContent = `● ${diff} 天前`; }
  else { badge.className = 'fresh-badge old'; badge.textContent = `● ${diff} 天前`; }
}

// ── Fetch all ──
async function loadAll() {
  try {
    const [listRes, nodesRes, eventsRes, rrgRes, candRes] = await Promise.all([
      fetch('/api/chain/list'), fetch('/api/chain/nodes'),
      fetch('/api/chain/events'), fetch('/api/chain/rrg'),
      fetch('/api/chain/candidates')
    ]);
    const list = await listRes.json();
    const nodes = await nodesRes.json();
    const events = await eventsRes.json();
    const rrg = await rrgRes.json();
    const cand = await candRes.json();

    if (list.ok) allChains = list.chains || [];
    if (nodes.ok) allNodes = nodes.nodes || [];
    if (events.ok) allEvents = events.events || [];
    if (rrg.ok) allRRG = rrg.rrg || [];
    if (cand.ok) allCandidates = cand.candidates || [];

    if (allChains.length > 0) updateFreshness(allChains[0].state_date);
    renderChainList(allChains);
  } catch (e) {
    document.getElementById('main-panel').innerHTML = `<div class="error-box"><h2>数据加载失败</h2><code>${e.message}</code></div>`;
  }
}

// ── Render sidebar ──
function renderChainList(chains) {
  const el = document.getElementById('chain-list');
  if (!chains.length) { el.innerHTML = '<p style="color:var(--c-muted);font-size:0.8rem;">暂无产业链数据</p>'; return; }
  el.innerHTML = chains.map(c => {
    const regimeClass = c.regime || 'contraction';
    const color = REGIME_COLORS[regimeClass] || '#6b7280';
    const sel = selectedChain === c.chain_id ? ' selected' : '';
    return `<div class="chain-item${sel}" data-chain="${c.chain_id}" onclick="selectChain('${c.chain_id}')">
      <div class="ci-top">
        <span class="ci-name">${c.chain_id}</span>
        <span class="ci-regime" style="background:${color}20;color:${color}">${REGIME_LABELS[regimeClass]||c.regime}</span>
      </div>
      <div class="ci-progress"><div class="ci-progress-bar" style="width:${c.prosperity_score}%;background:${color}"></div></div>
      <div class="ci-details">
        <span>景气 ${c.prosperity_score}</span>
        <span>事件 ${c.event_count}</span>
      </div>
    </div>`;
  }).join('');
}

// ── Search ──
document.getElementById('chain-search').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  const filtered = allChains.filter(c => c.chain_id.toLowerCase().includes(q));
  renderChainList(filtered);
});

// ── Select chain ──
async function selectChain(chainId) {
  selectedChain = chainId;
  renderChainList(allChains.filter(c => c.chain_id.toLowerCase().includes(document.getElementById('chain-search').value.toLowerCase())));

  try {
    const [detailRes, propRes] = await Promise.all([
      fetch(`/api/chain/${chainId}`),
      fetch(`/api/chain/${chainId}/propagation`)
    ]);
    const detail = await detailRes.json();
    const prop = await propRes.json();
    renderDetail(chainId, detail, prop);
  } catch(e) {
    document.getElementById('main-panel').innerHTML = `<div class="error-box"><h2>加载失败</h2><code>${e.message}</code></div>`;
  }
}

// ── Render detail ──
function renderDetail(chainId, detail, prop) {
  if (!detail.ok) {
    document.getElementById('main-panel').innerHTML = `<div class="error-box"><h2>数据不可用</h2><code>${detail.error}</code></div>`;
    return;
  }

  const ov = detail.overview || {};
  const nodes = detail.nodes || [];
  const events = detail.events || [];
  const paths = prop.ok ? (prop.paths || []) : [];
  const regime = ov.regime || 'contraction';
  const regColor = REGIME_COLORS[regime] || '#6b7280';
  const score = ov.prosperity_score || 0;
  const circumference = 2 * Math.PI * 35;
  const dash = (score / 100) * circumference;

  // Candidate stocks for this chain
  const chainCands = allCandidates.filter(c => c.chain_id === chainId);

  let html = '';

  // ── Overview card ──
  html += `<div class="panel">
    <div class="panel-hd"><h2>${chainId} · 全景指标</h2><span>${ov.state_date || '-'}</span></div>
    <div style="display:flex;gap:1.5rem;flex-wrap:wrap;align-items:center;">
      <div class="score-gauge">
        <div class="score-ring">
          <svg width="80" height="80" viewBox="0 0 80 80">
            <circle cx="40" cy="40" r="35" fill="none" stroke="#e5e7eb" stroke-width="6"/>
            <circle cx="40" cy="40" r="35" fill="none" stroke="${regColor}" stroke-width="6" stroke-dasharray="${dash} ${circumference}" stroke-linecap="round"/>
          </svg>
          <div class="val" style="color:${regColor}">${score}</div>
        </div>
        <div class="score-info">
          <div class="label">景气度评分</div>
          <div class="value" style="color:${regColor}">${REGIME_LABELS[regime]||regime}</div>
        </div>
      </div>
      <div class="metrics-row" style="flex:1;">
        <div class="metric-pill"><div class="mp-label">事件数</div><div class="mp-value">${ov.event_count||0}</div></div>
        <div class="metric-pill"><div class="mp-label">领涨环节</div><div class="mp-value" style="color:var(--c-leading)">${ov.lead_node||'-'}</div></div>
        <div class="metric-pill"><div class="mp-label">滞涨环节</div><div class="mp-value" style="color:var(--c-lagging)">${ov.lag_node||'-'}</div></div>
      </div>
    </div>
  </div>`;

  // ── Propagation flow ──
  if (paths.length > 0) {
    html += `<div class="panel">
      <div class="panel-hd"><h2>传导链路</h2><span>上下游资金与动量传导</span></div>
      <div class="flow-graph">`;
    
    const nodeSet = new Set();
    paths.forEach(p => { nodeSet.add(p.source_node); nodeSet.add(p.target_node); });
    const flowNodes = Array.from(nodeSet);
    const total = flowNodes.length;

    html += `<div class="flow-row">`;
    flowNodes.forEach((n, i) => {
      const nodeData = nodes.find(nd => nd.node_id === n) || {};
      const mom = nodeData.momentum_score || 0;
      const nodeColor = mom > 60 ? 'var(--c-leading)' : mom > 45 ? 'var(--c-improving)' : mom < 35 ? 'var(--c-lagging)' : 'var(--c-weakening)';
      const isLead = ov.lead_node === n;
      const isLag = ov.lag_node === n;
      html += `<div class="flow-node" style="border-color:${nodeColor};background:${nodeColor}08;" onclick="showNodeDetail('${chainId}','${n}')" title="点击查看详情">
        <div style="font-weight:700;font-size:0.85rem;">${n}</div>
        <div style="font-size:0.7rem;color:var(--c-muted);">动量 ${mom}</div>
        ${isLead ? '<span class="node-badge" style="background:#dcfce7;color:#15803d;">领涨</span>' : ''}
        ${isLag ? '<span class="node-badge" style="background:#fee2e2;color:#b91c1c;">滞涨</span>' : ''}
      </div>`;
      if (i < total - 1) {
        const path = paths.find(p => p.source_node === flowNodes[i] && p.target_node === flowNodes[i+1]);
        const active = path && Math.abs(path.correlation || 0) > 0.3;
        html += `<div class="flow-arrow${active?' active':''}">
          <span class="flow-label">${path ? 'r='+(path.correlation||0).toFixed(2) : ''}</span>
          <span class="flow-dir">${path ? (path.direction||'→') : '→'}</span>
          →
        </div>`;
      }
    });
    html += `</div>
      </div>
    </div>`;
  }

  // ── Node detail table ──
  if (nodes.length > 0) {
    html += `<div class="panel">
      <div class="panel-hd"><h2>环节详情</h2><span>点击环节查看关联标的</span></div>
      <table class="data-table">
        <thead><tr>
          <th>环节</th><th>资金流</th><th>仓位</th><th>动量</th><th>State</th><th>操作</th>
        </tr></thead>
        <tbody>`;
    nodes.forEach(n => {
      const mom = n.momentum_score || 0;
      const dotColor = mom > 60 ? 'var(--c-leading)' : mom > 45 ? 'var(--c-improving)' : mom < 35 ? 'var(--c-lagging)' : 'var(--c-weakening)';
      html += `<tr onclick="showNodeDetail('${chainId}','${n.node_id}')" title="点击查看关联标的">
        <td><strong>${n.node_name || n.node_id}</strong></td>
        <td><span class="score-dot" style="background:${(n.fund_flow_score||0)>50?'var(--c-leading)':'var(--c-weakening)'}"></span>${(n.fund_flow_score||0).toFixed(1)}</td>
        <td>${(n.position_score||0).toFixed(1)}</td>
        <td style="color:${dotColor};font-weight:600;">${(n.momentum_score||0).toFixed(1)}</td>
        <td><code style="font-size:0.75rem;">${n.state_hex||'--'}</code></td>
        <td><span style="font-size:0.75rem;color:var(--c-improving);cursor:pointer;">查看标的 →</span></td>
      </tr>`;
      if (expandedNode && expandedNode.chain === chainId && expandedNode.node === n.node_id) {
        html += `<tr class="detail-row open"><td colspan="6">
          <div id="node-detail-${n.node_id}" style="padding:0.5rem 0;">加载中...</div>
        </td></tr>`;
      }
    });
    html += `</tbody></table></div>`;
  }

  // ── Events ──
  if (events.length > 0) {
    html += `<div class="panel">
      <div class="panel-hd"><h2>近期事件</h2><span>按影响强度排序</span></div>
      <table class="data-table" id="events-table">
        <thead><tr><th data-sort="event_type">类型</th><th data-sort="event_source">来源</th><th data-sort="impact_score" class="sorted">影响强度 ▾</th><th>描述</th></tr></thead>
        <tbody>`;
    events.forEach(e => {
      const impColor = (e.impact_score||0) >= 60 ? 'var(--c-lagging)' : 'var(--c-weakening)';
      html += `<tr>
        <td><span style="font-weight:600;">${e.event_type}</span></td>
        <td>${e.event_source}</td>
        <td><span style="color:${impColor};font-weight:600;">${e.impact_score}</span></td>
        <td style="max-width:300px;">${e.description}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  // ── Candidates ──
  if (chainCands.length > 0) {
    html += `<div class="panel">
      <div class="panel-hd"><h2>候选标的</h2><span>Top ${chainCands.length}</span></div>
      <table class="data-table" id="cand-table">
        <thead><tr><th data-sort="stock_code">代码</th><th>名称</th><th data-sort="node_name">环节</th><th data-sort="assistant_score" class="sorted">评分 ▾</th><th>State</th><th>EF</th><th>闸门</th></tr></thead>
        <tbody>`;
    chainCands.forEach(c => {
      html += `<tr>
        <td><code style="font-size:0.8rem;">${c.stock_code}</code></td>
        <td><strong>${c.stock_name}</strong></td>
        <td>${c.node_name||'-'}</td>
        <td style="font-weight:600;">${c.assistant_score||0}</td>
        <td><code style="font-size:0.7rem;">${c.state_hex||'--'}</code></td>
        <td>${c.ef_count||0}</td>
        <td>${c.review_gate||'-'}</td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
  }

  document.getElementById('main-panel').innerHTML = html;

  // Bind sort to event table
  bindTableSort('events-table');
  bindTableSort('cand-table');
}

// ── Node detail (fetch stocks) ──
async function showNodeDetail(chainId, nodeId) {
  expandedNode = { chain: chainId, node: nodeId };
  const detailEl = document.getElementById(`node-detail-${nodeId}`);
  if (detailEl) {
    detailEl.innerHTML = '<span style="color:var(--c-muted);">加载中...</span>';
    try {
      const res = await fetch(`/api/chain/${chainId}/node/${nodeId}`);
      const data = await res.json();
      if (data.ok && data.stocks && data.stocks.length > 0) {
        const stocksHtml = data.stocks.map(s =>
          `<span style="display:inline-block;margin:2px 4px;padding:2px 8px;background:#fff;border:1px solid #e5e7eb;border-radius:6px;font-size:0.78rem;">
            <code>${s.stock_code}</code> ${s.stock_name}
          </span>`
        ).join('');
        detailEl.innerHTML = `<div style="font-size:0.78rem;color:var(--c-muted);margin-bottom:4px;">关联标的 (${data.stocks.length})：</div>${stocksHtml}`;
      } else {
        detailEl.innerHTML = '<span style="color:var(--c-muted);font-size:0.8rem;">暂无关联标的</span>';
      }
    } catch(e) {
      detailEl.innerHTML = `<span style="color:var(--c-lagging);">加载失败: ${e.message}</span>`;
    }
  } else {
    // Re-render to show the expanded row
    try {
      const [detailRes, propRes] = await Promise.all([
        fetch(`/api/chain/${chainId}`),
        fetch(`/api/chain/${chainId}/propagation`)
      ]);
      renderDetail(chainId, await detailRes.json(), await propRes.json());
      // Async load node detail
      setTimeout(async () => {
        const el = document.getElementById(`node-detail-${nodeId}`);
        if (!el) return;
        try {
          const res = await fetch(`/api/chain/${chainId}/node/${nodeId}`);
          const data = await res.json();
          if (data.ok && data.stocks && data.stocks.length > 0) {
            const stocksHtml = data.stocks.map(s =>
              `<span style="display:inline-block;margin:2px 4px;padding:2px 8px;background:#fff;border:1px solid #e5e7eb;border-radius:6px;font-size:0.78rem;">
                <code>${s.stock_code}</code> ${s.stock_name}
              </span>`
            ).join('');
            el.innerHTML = `<div style="font-size:0.78rem;color:var(--c-muted);margin-bottom:4px;">关联标的 (${data.stocks.length})：</div>${stocksHtml}`;
          } else {
            el.innerHTML = '<span style="color:var(--c-muted);font-size:0.8rem;">暂无关联标的</span>';
          }
        } catch(e) {}
      }, 100);
    } catch(e) {}
  }
}

// ── Table sort ──
function bindTableSort(tableId) {
  const table = document.getElementById(tableId);
  if (!table) return;
  const headers = table.querySelectorAll('th[data-sort]');
  headers.forEach(th => {
    th.addEventListener('click', () => {
      const field = th.dataset.sort;
      const tbody = table.querySelector('tbody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      const isAsc = th.classList.contains('sorted') && th.textContent.includes('▴');
      
      headers.forEach(h => h.classList.remove('sorted'));
      th.classList.add('sorted');
      
      rows.sort((a, b) => {
        const aVal = getCellValue(a, field);
        const bVal = getCellValue(b, field);
        const aNum = parseFloat(aVal), bNum = parseFloat(bVal);
        if (!isNaN(aNum) && !isNaN(bNum)) return isAsc ? aNum - bNum : bNum - aNum;
        return isAsc ? String(aVal).localeCompare(String(bVal)) : String(bVal).localeCompare(String(aVal));
      });
      
      th.innerHTML = th.dataset.sort === 'stock_code' ? (isAsc ? '代码 ▴' : '代码 ▾') :
                     th.dataset.sort === 'assistant_score' ? (isAsc ? '评分 ▴' : '评分 ▾') :
                     th.dataset.sort === 'impact_score' ? (isAsc ? '影响强度 ▴' : '影响强度 ▾') :
                     th.dataset.sort === 'event_type' ? (isAsc ? '类型 ▴' : '类型 ▾') :
                     th.dataset.sort === 'event_source' ? (isAsc ? '来源 ▴' : '来源 ▾') :
                     th.dataset.sort === 'node_name' ? (isAsc ? '环节 ▴' : '环节 ▾') : th.textContent;
      
      rows.forEach(r => tbody.appendChild(r));
    });
  });
}

function getCellValue(row, field) {
  const headers = row.closest('table').querySelectorAll('th[data-sort]');
  let idx = -1;
  headers.forEach((h, i) => { if (h.dataset.sort === field) idx = i; });
  if (idx < 0) return '';
  const cells = row.querySelectorAll('td');
  return cells[idx] ? cells[idx].textContent.trim() : '';
}
