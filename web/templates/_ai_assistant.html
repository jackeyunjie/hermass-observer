    <!-- AI 助手 -->
    <div class="ai-overlay" id="ai-overlay" onclick="aiToggle()"></div>
    <button class="ai-trigger" id="ai-trigger" onclick="aiToggle()" aria-label="打开 Hermass 助手">
      <svg class="ai-elephant" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="elBody" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#7ec8c8"/>
            <stop offset="100%" stop-color="#4a9e9e"/>
          </linearGradient>
          <linearGradient id="elEar" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#a8e6e6"/>
            <stop offset="100%" stop-color="#6bcbcb"/>
          </linearGradient>
        </defs>
        <!-- 左耳 -->
        <ellipse cx="18" cy="24" rx="10" ry="13" fill="url(#elEar)" transform="rotate(-15 18 24)"/>
        <!-- 右耳 -->
        <ellipse cx="46" cy="24" rx="10" ry="13" fill="url(#elEar)" transform="rotate(15 46 24)"/>
        <!-- 身体 -->
        <circle cx="32" cy="34" r="16" fill="url(#elBody)"/>
        <!-- 额头高光 -->
        <ellipse cx="28" cy="26" rx="5" ry="3" fill="rgba(255,255,255,0.35)" transform="rotate(-20 28 26)"/>
        <!-- 左眼 -->
        <circle cx="26" cy="32" r="2.2" fill="#1a3c3c"/>
        <circle cx="25.2" cy="31.2" r="0.7" fill="#fff"/>
        <!-- 右眼 -->
        <circle cx="38" cy="32" r="2.2" fill="#1a3c3c"/>
        <circle cx="37.2" cy="31.2" r="0.7" fill="#fff"/>
        <!-- 腮红 -->
        <ellipse cx="22" cy="37" rx="3" ry="2" fill="rgba(255,160,160,0.35)"/>
        <ellipse cx="42" cy="37" rx="3" ry="2" fill="rgba(255,160,160,0.35)"/>
        <!-- 鼻子 -->
        <path d="M30 38 Q32 50 29 54 Q27 57 30 58 Q34 57 35 54 Q36 48 34 38" fill="#5fbdbd"/>
        <!-- 鼻尖 -->
        <ellipse cx="30.5" cy="57" rx="3" ry="2" fill="#7ec8c8"/>
      </svg>
    </button>
    <div class="ai-drawer" id="ai-drawer">
      <div class="ai-header">
        <div class="ai-identity">
          <div class="ai-avatar" aria-hidden="true">
            <span class="ai-avatar-ring ai-avatar-ring-1"></span>
            <span class="ai-avatar-ring ai-avatar-ring-2"></span>
            <span class="ai-avatar-core"></span>
          </div>
          <div>
            <h3>观象</h3>
            <p class="ai-identity-subtitle">AI Native 多周期研究专家</p>
          </div>
        </div>
        <div class="ai-header-controls">
          <div class="ai-mode-switch" role="tablist" aria-label="助手模式">
            <button type="button" class="active" id="ai-mode-chat" onclick="aiSetMode('chat')">研究</button>
            <button type="button" id="ai-mode-agent" onclick="aiSetMode('agent')">任务</button>
          </div>
          <label class="ai-llm-toggle">
            <input type="checkbox" id="ai-use-llm" checked />
            <span>专家增强</span>
          </label>
        </div>
        <button class="ai-close" onclick="aiToggle()" aria-label="关闭">&times;</button>
      </div>
      <div class="ai-body" id="ai-body">
        <div class="ai-welcome" id="ai-welcome">
          <div class="ai-welcome-kicker">今日研究流</div>
          <h4>先问结论，再看证据。</h4>
          <p id="ai-hint-text">我会先告诉你今天该走哪条路，再帮你判断这只票要不要继续看，最后把判断变成观察任务。页面浏览默认免登录。</p>
          <div class="ai-capability-grid">
            <button type="button" onclick="aiAsk('今天更适合自上而下还是自下而上？给我结论和下一步')">
              <b>路径路由</b><span>先走哪条路</span>
            </button>
            <button type="button" onclick="aiAsk('今天机会池里先看哪类标的？按一致性和风险排序')">
              <b>机会排序</b><span>动谁更合理</span>
            </button>
            <button type="button" onclick="aiAsk('帮我分析 000021 当前是可继续、等条件还是暂不继续，只给结论和下一步')">
              <b>个股裁决</b><span>要不要继续看</span>
            </button>
            <button type="button" onclick="aiSetMode('agent');aiAsk('盯 000021，突破周线关键位提醒我，邮箱 test@example.com')">
              <b>任务委托</b><span>盯盘与提醒</span>
            </button>
          </div>
        </div>
        <div class="ai-session-ctx" id="ai-session-ctx" style="display:none;">
          <span class="ctx-dot"></span>
          <span id="ai-ctx-text">跟踪中：000021.SZ</span>
        </div>
        <div class="ai-quick" id="ai-quick">
          <button onclick="aiAsk('今天更适合自上而下还是自下而上？只给结论和下一步')">走哪条路</button>
          <button onclick="aiAsk('今天先看什么方向？按市场、行业、机会三层说')">看什么方向</button>
          <button onclick="aiAsk('帮我看 000021：可继续、等条件还是暂不继续')">分析个股</button>
          <button onclick="aiAsk('我现在在哪一步？下一步该点哪里')">下一步去哪</button>
        </div>
        <div class="ai-messages" id="ai-messages"></div>
      </div>
      <div class="ai-input-area">
        <input type="text" id="ai-input" placeholder="输入问题…" onkeydown="if(event.key==='Enter')aiSend()" />
        <button onclick="aiSend()">发送</button>
      </div>
    </div>

    <script>
      (function() {
        var drawer = document.getElementById('ai-drawer');
        var overlay = document.getElementById('ai-overlay');
        var trigger = document.getElementById('ai-trigger');
        var messages = document.getElementById('ai-messages');
        var input = document.getElementById('ai-input');
        var pageContext = "{{ ai_page_context or request.url.path }}";
        var aiSession = { session_id: '', stock_code: '', email: '', recent_topics: [], turn_count: 0 };
        window.aiSession = aiSession;
        var aiMode = 'chat';

        function aiToggle() {
          var open = drawer.classList.contains('open');
          if (open) {
            drawer.classList.remove('open');
            overlay.classList.remove('open');
            trigger.style.display = 'flex';
          } else {
            drawer.classList.add('open');
            overlay.classList.add('open');
            trigger.style.display = 'none';
          }
        }
        window.aiToggle = aiToggle;

        function escapeHtml(t) {
          var d = document.createElement('div');
          d.textContent = t || '';
          return d.innerHTML;
        }

        function aiHideWelcome() {
          var welcome = document.getElementById('ai-welcome');
          if (welcome) welcome.style.display = 'none';
        }

        function aiAppend(text, isUser) {
          if (isUser) aiHideWelcome();
          var div = document.createElement('div');
          div.className = 'ai-msg ' + (isUser ? 'user' : 'bot');
          div.innerHTML = text;
          messages.appendChild(div);
          var body = document.getElementById('ai-body');
          body.scrollTop = body.scrollHeight;
        }

        function aiShowTyping() {
          var div = document.createElement('div');
          div.className = 'ai-msg bot';
          div.id = 'ai-typing-msg';
          div.innerHTML = '<div class="ai-typing"><span class="ai-typing-label">正在思考</span><span class="ai-typing-dot"></span><span class="ai-typing-dot"></span><span class="ai-typing-dot"></span></div>';
          messages.appendChild(div);
          var body = document.getElementById('ai-body');
          body.scrollTop = body.scrollHeight;
        }

        function aiRemoveTyping() {
          var el = document.getElementById('ai-typing-msg');
          if (el) el.remove();
        }

        function aiUpdateCtx() {
          var ctxEl = document.getElementById('ai-session-ctx');
          var ctxText = document.getElementById('ai-ctx-text');
          if (aiSession.stock_code) {
            ctxEl.style.display = 'inline-flex';
            ctxText.textContent = '跟踪中：' + aiSession.stock_code;
          } else {
            ctxEl.style.display = 'none';
          }
        }

        function providerLabel(data) {
          var provider = data.provider || '';
          if (provider === 'managed_deepseek' || provider === 'deepseek_direct') return 'DeepSeek 增强';
          if (provider === 'agently_deepseek') return 'Agently 多 Agent';
          if (provider.indexOf('workflow_') === 0) return '外部工作流';
          return '本地规则';
        }

        function supportLabel(data) {
          if (data.data_support === 'local_data') return ['local', '本地数据支持'];
          if (data.data_support === 'llm_only') return ['llm', 'AI 推理为主'];
          if (data.data_support === 'rule_only') return ['rule', '规则口径'];
          return ['rule', '研究辅助'];
        }

        function aiRender(data) {
          aiRemoveTyping();
          if (data.session_id) {
            aiSession.session_id = data.session_id;
          }
          if (data.remembered_stock_code) {
            aiSession.stock_code = data.remembered_stock_code;
          }
          if (data.remembered_email) {
            aiSession.email = data.remembered_email;
          }
          aiUpdateCtx();
          var html = '';
          var support = supportLabel(data);
          html += '<div class="ai-answer-card">';
          html += '<div class="ai-answer-top">';
          html += '<span class="ai-answer-title">观象研判</span>';
          html += '<span class="ai-source-badge ' + support[0] + '">' + escapeHtml(support[1]) + '</span>';
          html += '</div>';
          if (data.answer) {
            html += '<div class="ai-verdict">' + escapeHtml(data.answer || '') + '</div>';
          }
          if (data.why || data.multi_cycle_view || data.single_cycle_position) {
            html += '<div class="ai-evidence-grid">';
            if (data.why) {
              html += '<div class="ai-evidence-card"><span>判断依据</span><p>' + escapeHtml(data.why) + '</p></div>';
            }
            if (data.multi_cycle_view) {
              html += '<div class="ai-evidence-card"><span>多周期</span><p>' + escapeHtml(data.multi_cycle_view) + '</p></div>';
            }
            if (data.single_cycle_position) {
              html += '<div class="ai-evidence-card"><span>当前位置</span><p>' + escapeHtml(data.single_cycle_position) + '</p></div>';
            }
            html += '</div>';
          }
          if (data.avoid) {
            html += '<div class="ai-risk-card"><span>风险边界</span><p>' + escapeHtml(data.avoid) + '</p></div>';
          }
          if (data.next_actions && data.next_actions.length) {
            html += '<div class="ai-action-label">建议下一步</div>';
            html += '<div class="ai-actions">';
            data.next_actions.forEach(function(a) {
              html += '<a href="' + escapeHtml(a.url) + '">' + escapeHtml(a.label) + '</a>';
            });
            html += '</div>';
          }
          html += '</div>';
          if (data.provider || data.enhancement_used !== undefined || data.mode_used) {
            var meta = [];
            meta.push(providerLabel(data));
            if (data.enhancement_used === true) meta.push('已启用增强解释');
            else if (data.enhancement_used === false && data.provider !== 'rule_based') meta.push('未使用增强');
            if (data.mode_used === 'agent') meta.push('任务模式');
            html += '<div class="ai-meta">' + escapeHtml(meta.join(' · ')) + '</div>';
          }
          if (data.support_note) {
            html += '<div class="ai-support-note">' + escapeHtml(data.support_note) + '</div>';
          }
          if (data.freshness_note) {
            html += '<div class="ai-meta">' + escapeHtml(data.freshness_note) + '</div>';
          }
          if (data.task_card) {
            html += '<div class="ai-task-card">';
            html += '<div class="ai-task-title">' + escapeHtml(data.task_card.title || '任务确认') + '</div>';
            html += '<div class="ai-task-row"><span>类型</span><b>' + escapeHtml(data.task_card.task_type || '-') + '</b></div>';
            html += '<div class="ai-task-row"><span>股票</span><b>' + escapeHtml(data.task_card.stock_code || '-') + '</b></div>';
            html += '<div class="ai-task-row"><span>条件</span><b>' + escapeHtml(data.task_card.note || data.task_card.trigger_type || '-') + '</b></div>';
            html += '<div class="ai-task-row"><span>邮箱</span><b>' + escapeHtml(data.task_card.email || '-') + '</b></div>';
            html += '<div class="ai-task-row"><span>有效期</span><b>' + escapeHtml(data.task_card.valid_from || '-') + ' → ' + escapeHtml(data.task_card.valid_to || '-') + '</b></div>';
            html += '<div class="ai-task-row"><span>状态</span><b>' + escapeHtml(data.task_card.status || '-') + '</b></div>';
            html += '</div>';
          }
          if (data.remembered_stock_code) {
            var followupEmail = aiSession.email || 'test@example.com';
            html += '<div class="ai-followups">';
            html += '<button type="button" onclick="aiAsk(\'看价值组合\')">看价值组合</button>';
            html += '<button type="button" onclick="aiAsk(\'那它现在是假突破吗\')">继续追问位置</button>';
            html += '<button type="button" onclick="aiAsk(\'盯它，突破周线关键位提醒我，邮箱 ' + escapeHtml(followupEmail) + '\')">直接盯盘</button>';
            html += '</div>';
          }
          aiAppend(html, false);
        }

        function aiSetMode(mode) {
          aiMode = mode === 'agent' ? 'agent' : 'chat';
          document.getElementById('ai-mode-chat').classList.toggle('active', aiMode === 'chat');
          document.getElementById('ai-mode-agent').classList.toggle('active', aiMode === 'agent');
          document.getElementById('ai-hint-text').textContent =
            aiMode === 'agent'
              ? '任务模式适合交给系统执行后续动作，比如盯盘、长期跟踪、邮件提醒。'
              : '对话模式适合先问市场、方向、个股怎么看，再决定下一步。深度价值、市场和行业解释会优先尝试平台托管模型。';
        }
        window.aiSetMode = aiSetMode;

        function heroAsk() {
          var v = (document.getElementById('ai-hero-input') || {}).value;
          if (!v || !v.trim()) return;
          aiAsk(v.trim());
          document.getElementById('ai-hero-input').value = '';
        }
        window.heroAsk = heroAsk;

        function heroAskChip(text) {
          aiAsk(text);
          document.getElementById('ai-hero-input').value = '';
        }
        window.heroAskChip = heroAskChip;

        // 委托「问观象」按钮点击：从 data-stock / data-name 读取股票信息
        // 使用捕获阶段，避免 watchlist 等页面 stopPropagation() 阻断冒泡
        document.addEventListener('click', function(e) {
          var btn = e.target.closest('.ask-ai-chip');
          if (!btn) return;
          e.stopPropagation();
          var code = btn.getAttribute('data-stock') || '';
          var name = btn.getAttribute('data-name') || '';
          if (!code) return;
          aiSession.stock_code = code;
          aiUpdateCtx();
          var label = name ? (code + ' ' + name) : code;
          aiAsk('帮我分析 ' + label + ' 当前多周期状态和操作建议');
        }, true);

        function aiAsk(text) {
          // 从首页 C 位或 watchlist 问观象按钮触发时，确保抽屉打开
          var drawer = document.getElementById('ai-drawer');
          var overlay = document.getElementById('ai-overlay');
          var trigger = document.getElementById('ai-trigger');
          if (drawer && !drawer.classList.contains('open')) {
            drawer.classList.add('open');
            if (overlay) overlay.classList.add('open');
            if (trigger) trigger.style.display = 'none';
          }
          aiAppend(text, true);
          aiSendMsg(text);
        }
        window.aiAsk = aiAsk;

        function aiSend() {
          var text = input.value.trim();
          if (!text) return;
          input.value = '';
          aiAppend(text, true);
          aiSendMsg(text);
        }
        window.aiSend = aiSend;

        function aiSendMsg(text) {
          aiShowTyping();
          var placeholder = document.getElementById('ai-typing-msg');

          // 更新本地会话记忆
          aiSession.turn_count = (aiSession.turn_count || 0) + 1;
          if (!aiSession.recent_topics) aiSession.recent_topics = [];
          aiSession.recent_topics.unshift(text.substring(0, 80));
          if (aiSession.recent_topics.length > 5) aiSession.recent_topics = aiSession.recent_topics.slice(0, 5);

          fetch('/api/chat/query', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
              message: text,
              page_context: pageContext,
              session_id: aiSession.session_id,
              session_context: {
                stock_code: aiSession.stock_code,
                email: aiSession.email,
                recent_topics: aiSession.recent_topics || [],
                turn_count: aiSession.turn_count || 0,
                page: pageContext
              },
              mode: aiMode,
              use_llm: !!document.getElementById('ai-use-llm')?.checked
            })
          })
          .then(function(r) {
            if (!r.ok) {
              var msg = r.status === 429 ? '请求太频繁，请稍后再试。' :
                        r.status === 401 ? 'AI 对话入口仍受保护。页面可直接浏览，提问观象时再使用对话账号。' :
                        r.status >= 500 ? '服务端异常（HTTP ' + r.status + '），稍后重试。' :
                        '请求失败（HTTP ' + r.status + '）。';
              throw new Error(msg);
            }
            return r.json();
          })
          .then(function(data) {
            aiRemoveTyping();
            aiRender(data);
          })
          .catch(function(err) {
            console.error('[观象] fetch error:', err);
            aiRemoveTyping();
            aiRender({
              answer: err.message || '请求失败，请检查网络后重试。',
              next_actions: [{label: '打开首页', url: '/'}]
            });
          });
        }
      })();
    </script>
